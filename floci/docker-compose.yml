# docker-compose.yml — 4 Floci instances cho parallel deploy
services:
  floci-1:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    volumes:
      - ./data-1:/app/data

  floci-2:
    image: floci/floci:latest
    ports:
      - "4567:4566"
    volumes:
      - ./data-2:/app/data

  floci-3:
    image: floci/floci:latest
    ports:
      - "4568:4566"
    volumes:
      - ./data-3:/app/data

  floci-4:
    image: floci/floci:latest
    ports:
      - "4569:4566"
    volumes:
      - ./data-4:/app/data

  floci-5:
    image: floci/floci:latest
    ports:
      - "4570:4566"
    volumes:
      - ./data-5:/app/data

  floci-6:
    image: floci/floci:latest
    ports:
      - "4571:4566"
    volumes:
      - ./data-6:/app/data
